<style>
/* =============================
   VAULTIN — DESIGN SYSTEM v2.0
   Glassmorphism + Emerald/Teal
   Dark-first, light adaptive
   ============================= */

:root {
  /* Base palette — dark-first */
  --bg-base: #031c1b;
  --bg-mid: #052e2b;
  --bg-elev: #073d39;
  --surface: rgba(255,255,255,.06);
  --surface-hover: rgba(255,255,255,.10);
  --surface-solid: #0a4a45;
  --surface-alt: rgba(255,255,255,.04);
  --border: rgba(255,255,255,.10);
  --border-strong: rgba(255,255,255,.18);

  /* Text */
  --fg: #e6f7f4;
  --fg-secondary: #a7d4cd;
  --muted: #6b9a93;
  --muted-dim: #4a7a73;

  /* Brand — emerald / teal gradient */
  --emerald: #10b981;
  --emerald-bright: #34d399;
  --teal: #0d9488;
  --teal-bright: #2dd4bf;
  --brand-grad: linear-gradient(135deg, #10b981 0%, #0d9488 100%);
  --brand-grad-bright: linear-gradient(135deg, #34d399 0%, #2dd4bf 100%);
  --brand-glow: rgba(16,185,129,.35);

  /* Semantic */
  --success: #10b981;
  --success-bg: rgba(16,185,129,.12);
  --danger: #f43f5e;
  --danger-bg: rgba(244,63,94,.12);
  --warning: #f59e0b;
  --warning-bg: rgba(245,158,11,.12);
  --info: #0ea5e9;
  --info-bg: rgba(14,165,233,.12);

  /* Glass */
  --glass-blur: 20px;
  --glass-bg: rgba(255,255,255,.05);
  --glass-border: rgba(255,255,255,.12);
  --glass-shadow: 0 8px 32px rgba(0,0,0,.25);

  /* Shadow — restrained 3-tier */
  --shadow-sm: 0 1px 3px rgba(0,0,0,.15);
  --shadow-md: 0 4px 16px rgba(0,0,0,.20);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.30);

  /* Radius */
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 18px;
  --r-xl: 24px;
  --r-full: 9999px;

  /* Spacing — 4/8 grid */
  --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px;
  --sp-5: 20px; --sp-6: 24px; --sp-8: 32px; --sp-10: 40px; --sp-12: 48px;

  /* Typography */
  --fs-xs: 11px; --fs-sm: 13px; --fs-base: 15px; --fs-lg: 18px;
  --fs-xl: 22px; --fs-2xl: 28px; --fs-3xl: 36px;
  --font: -apple-system, BlinkMacSystemFont, 'Inter','Segoe UI', Roboto, sans-serif;
  --font-mono: 'SF Mono','Fira Code','Cascadia Code',monospace;
  --lh-tight: 1.2;
  --lh-base: 1.5;

  /* Motion */
  --dur-fast: 150ms; --dur-base: 220ms; --dur-slow: 350ms;
  --ease-out: cubic-bezier(0.22,0.61,0.36,1);
  --ease-spring: cubic-bezier(0.34,1.56,0.64,1);
}

[data-theme="light"] {
  --bg-base: #f0fdfa;
  --bg-mid: #ecfdf5;
  --bg-elev: #ffffff;
  --surface: rgba(0,0,0,.03);
  --surface-hover: rgba(0,0,0,.06);
  --surface-solid: #ffffff;
  --surface-alt: rgba(0,0,0,.02);
  --border: rgba(0,0,0,.08);
  --border-strong: rgba(0,0,0,.15);
  --fg: #042f2e;
  --fg-secondary: #115e59;
  --muted: #6b9a93;
  --muted-dim: #94a3b8;
  --glass-bg: rgba(255,255,255,.60);
  --glass-border: rgba(255,255,255,.80);
  --glass-shadow: 0 8px 32px rgba(13,148,136,.10);
  --shadow-sm: 0 1px 3px rgba(13,148,136,.08);
  --shadow-md: 0 4px 16px rgba(13,148,136,.10);
  --shadow-lg: 0 12px 40px rgba(13,148,136,.12);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font);
  background: var(--bg-base);
  color: var(--fg);
  font-size: var(--fs-base);
  line-height: var(--lh-base);
  transition: background var(--dur-base) var(--ease-out), color var(--dur-base) var(--ease-out);
  padding-bottom: env(safe-area-inset-bottom);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* Ambient gradient background */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: -1;
  background:
    radial-gradient(ellipse 60% 50% at 20% 0%, rgba(16,185,129,.12), transparent 70%),
    radial-gradient(ellipse 50% 60% at 80% 100%, rgba(13,148,136,.10), transparent 70%),
    var(--bg-base);
}

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; font-size: inherit; }
input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
:focus-visible { outline: 2px solid var(--emerald-bright); outline-offset: 2px; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

/* =============================
   LAYOUT
   ============================= */
.app { display: flex; min-height: 100vh; }
.content { flex: 1; min-width: 0; display: flex; flex-direction: column; }

/* =============================
   HEADER — Glass
   ============================= */
.header {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between; gap: var(--sp-3);
  padding: var(--sp-4) var(--sp-4) var(--sp-3);
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border-bottom: 1px solid var(--glass-border);
}
.brand { display: flex; align-items: center; gap: var(--sp-3); }
.brand-logo {
  width: 36px; height: 36px; border-radius: var(--r-md);
  background: var(--brand-grad);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 12px var(--brand-glow);
  flex-shrink: 0;
}
.brand-logo svg { width: 20px; height: 20px; }
.brand-name { font-size: var(--fs-lg); font-weight: 700; letter-spacing: -.02em; }
.brand-name span { background: var(--brand-grad-bright); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.header-actions { display: flex; gap: var(--sp-2); align-items: center; }

/* =============================
   ICON BUTTONS — Glass pill
   ============================= */
.icon-btn {
  width: 38px; height: 38px; border-radius: var(--r-md);
  display: flex; align-items: center; justify-content: center;
  background: var(--surface); border: 1px solid var(--border);
  transition: background var(--dur-fast) var(--ease-out), border-color var(--dur-fast);
  flex-shrink: 0;
  color: var(--fg-secondary);
}
.icon-btn:hover { background: var(--surface-hover); border-color: var(--border-strong); color: var(--fg); }
.icon-btn svg { width: 18px; height: 18px; }
.icon-btn label { cursor: pointer; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }

/* =============================
   MONTH NAV
   ============================= */
.month-nav {
  display: flex; align-items: center; justify-content: center; gap: var(--sp-4);
  padding: var(--sp-3) var(--sp-4);
  background: var(--surface-alt);
  border-bottom: 1px solid var(--border);
}
.month-nav-btn {
  width: 34px; height: 34px; border-radius: var(--r-sm);
  background: var(--surface); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  color: var(--fg-secondary);
  transition: all var(--dur-fast) var(--ease-out);
}
.month-nav-btn:hover { background: var(--surface-hover); color: var(--fg); border-color: var(--emerald); }
.month-nav-btn svg { width: 16px; height: 16px; }
.month-label { font-size: var(--fs-base); font-weight: 600; min-width: 130px; text-align: center; letter-spacing: -.01em; }

/* =============================
   SIDEBAR + DRAWER NAV
   ============================= */
.tabs { display: none; }
.sidebar {
  width: 240px; flex-shrink: 0; position: sticky; top: 0; align-self: flex-start;
  height: 100vh; display: flex; flex-direction: column;
  background: var(--surface-alt); border-right: 1px solid var(--border); z-index: 200;
}
.sidebar-head { display: flex; align-items: center; gap: var(--sp-3); padding: var(--sp-4); border-bottom: 1px solid var(--border); }
.sidebar-nav { flex: 1; overflow-y: auto; padding: var(--sp-3); display: flex; flex-direction: column; gap: var(--sp-1); }
.nav-group { display: flex; flex-direction: column; }
.nav-group + .nav-group { margin-top: var(--sp-2); }
.nav-group-header {
  display: flex; align-items: center; justify-content: space-between; gap: var(--sp-2);
  padding: var(--sp-2) var(--sp-3); font-size: var(--fs-xs); font-weight: 700;
  text-transform: uppercase; letter-spacing: .06em; color: var(--muted);
  cursor: pointer; user-select: none; border-radius: var(--r-sm);
}
.nav-group-header:hover { color: var(--fg); }
.nav-group-header .chev { width: 14px; height: 14px; flex-shrink: 0; transition: transform var(--dur-fast) var(--ease-out); }
.nav-group.collapsed .chev { transform: rotate(-90deg); }
.nav-group-items { display: flex; flex-direction: column; gap: 2px; }
.nav-group.collapsed .nav-group-items { display: none; }
.nav-item {
  display: flex; align-items: center; gap: var(--sp-3); width: 100%; text-align: left;
  padding: var(--sp-2) var(--sp-3); border-radius: var(--r-md);
  font-size: var(--fs-sm); font-weight: 600; color: var(--fg-secondary);
  transition: all var(--dur-fast) var(--ease-out);
}
.nav-item:hover { background: var(--surface-hover); color: var(--fg); }
.nav-item.active { background: var(--brand-grad); color: white; box-shadow: 0 2px 12px var(--brand-glow); }
.nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
.sidebar-foot { display: flex; align-items: center; gap: var(--sp-2); padding: var(--sp-3) var(--sp-4); border-top: 1px solid var(--border); }
.sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 150; opacity: 0; pointer-events: none; transition: opacity var(--dur-fast) var(--ease-out); }
.sidebar-overlay.open { opacity: 1; pointer-events: auto; }
.topbar {
  position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: var(--sp-3);
  padding: var(--sp-3) var(--sp-4);
  background: var(--glass-bg); backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
  border-bottom: 1px solid var(--glass-border);
}
.menu-btn { width: 38px; height: 38px; border-radius: var(--r-md); display: flex; align-items: center; justify-content: center; background: var(--surface); border: 1px solid var(--border); color: var(--fg-secondary); flex-shrink: 0; }
.menu-btn:hover { background: var(--surface-hover); color: var(--fg); }
.menu-btn svg { width: 20px; height: 20px; }
@media (max-width: 767px) {
  .sidebar { position: fixed; top: 0; left: 0; height: 100vh; transform: translateX(-100%); transition: transform .25s var(--ease-out); box-shadow: var(--shadow-lg); }
  .sidebar.open { transform: translateX(0); }
}
@media (min-width: 768px) {
  .topbar { display: none; }
  .sidebar-overlay { display: none; }
  #sidebarClose { display: none; }
}

/* =============================
   MAIN
   ============================= */
.main { padding: var(--sp-4); display: flex; flex-direction: column; gap: var(--sp-4); }
@media (min-width: 768px) { .main { padding: var(--sp-6); gap: var(--sp-5); } }

/* =============================
   CARD — Glass surface
   ============================= */
.card {
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border-radius: var(--r-lg); border: 1px solid var(--glass-border);
  box-shadow: var(--glass-shadow);
  overflow: hidden;
  transition: border-color var(--dur-fast);
}
.card:hover { border-color: var(--border-strong); }
.card-header { padding: var(--sp-4) var(--sp-4) var(--sp-2); display: flex; align-items: center; justify-content: space-between; }
.card-title { font-size: var(--fs-xs); font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
.card-body { padding: var(--sp-2) var(--sp-4) var(--sp-4); }

/* =============================
   GRADIENT HERO CARD — Dashboard
   ============================= */
.hero-card {
  position: relative;
  border-radius: var(--r-xl);
  padding: var(--sp-6);
  background: var(--brand-grad);
  box-shadow: 0 12px 40px var(--brand-glow);
  overflow: hidden;
  color: white;
}
.hero-card::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 120% at 70% -20%, rgba(255,255,255,.15), transparent 60%);
}
.hero-card > * { position: relative; z-index: 1; }
.hero-label { font-size: var(--fs-sm); opacity: .8; font-weight: 500; margin-bottom: var(--sp-1); }
.hero-value { font-size: var(--fs-3xl); font-weight: 700; letter-spacing: -.02em; line-height: var(--lh-tight); }
.hero-sub { display: flex; gap: var(--sp-4); margin-top: var(--sp-4); }
.hero-sub-item { flex: 1; }
.hero-sub-label { font-size: var(--fs-xs); opacity: .7; text-transform: uppercase; letter-spacing: .04em; }
.hero-sub-value { font-size: var(--fs-base); font-weight: 600; margin-top: var(--sp-1); }

/* =============================
   CASHFLOW GRID
   ============================= */
.cashflow-grid { display: grid; gap: var(--sp-2); }
.cashflow-row { display: flex; align-items: center; justify-content: space-between; padding: var(--sp-3) var(--sp-4); border-radius: var(--r-md); }
.cashflow-row.plus { background: var(--success-bg); }
.cashflow-row.minus { background: rgba(244,63,94,.08); }
.cashflow-row.total { background: var(--surface-hover); font-weight: 700; border: 1px solid var(--border-strong); }
.cashflow-left { display: flex; align-items: center; gap: var(--sp-3); }
.cashflow-left svg { width: 18px; height: 18px; }
.cashflow-sign { width: 20px; text-align: center; font-weight: 700; }
.cashflow-label { font-size: var(--fs-base); }
.cashflow-right { font-size: var(--fs-lg); font-weight: 700; font-variant-numeric: tabular-nums; }
.cashflow-right.positive { color: var(--success); }
.cashflow-right.negative { color: var(--danger); }

.on-track-badge { display: inline-flex; align-items: center; gap: var(--sp-1); padding: var(--sp-1) var(--sp-3); border-radius: var(--r-full); font-size: var(--fs-xs); font-weight: 600; }
.on-track-badge.on { background: var(--success-bg); color: var(--success); }
.on-track-badge.over { background: var(--danger-bg); color: var(--danger); }

/* =============================
   SUMMARY TABLE
   ============================= */
.summary-table { width: 100%; border-collapse: collapse; }
.summary-table th { text-align: left; font-size: var(--fs-xs); color: var(--muted); font-weight: 600; padding: var(--sp-2) var(--sp-3); border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: .04em; }
.summary-table td { padding: var(--sp-3); border-bottom: 1px solid var(--border); font-size: var(--fs-sm); font-variant-numeric: tabular-nums; }
.summary-table tr:last-child td { border-bottom: none; }
.summary-table tfoot td { font-weight: 700; border-top: 2px solid var(--border); background: var(--surface-alt); }

/* =============================
   PROGRESS BAR
   ============================= */
.progress-track { width: 100%; height: 6px; background: var(--surface); border-radius: var(--r-full); overflow: hidden; }
.progress-fill { height: 100%; border-radius: var(--r-full); transition: width var(--dur-slow) var(--ease-out); }
.progress-label-row { display: flex; justify-content: space-between; font-size: var(--fs-xs); color: var(--muted); margin-top: var(--sp-1); }
.progress-mini { width: 60px; height: 5px; background: var(--surface); border-radius: 3px; overflow: hidden; }
.progress-mini-fill { height: 100%; border-radius: 3px; transition: width .3s ease; }

/* =============================
   FORMS
   ============================= */
.form-group { margin-bottom: var(--sp-4); }
.form-label { display: block; font-size: var(--fs-sm); font-weight: 600; color: var(--fg-secondary); margin-bottom: var(--sp-2); }
.form-input, .form-select {
  width: 100%; padding: var(--sp-3); border-radius: var(--r-md);
  border: 1px solid var(--border); background: var(--surface); font-size: var(--fs-base);
  transition: border-color var(--dur-fast), box-shadow var(--dur-fast);
  font-variant-numeric: tabular-nums;
}
.form-input:focus, .form-select:focus { border-color: var(--emerald); outline: none; box-shadow: 0 0 0 3px var(--success-bg); }
.form-input::placeholder { color: var(--muted-dim); }
.form-row { display: flex; gap: var(--sp-3); }
.form-row > .form-group { flex: 1; }

/* =============================
   BUTTONS
   ============================= */
.btn {
  padding: var(--sp-3) var(--sp-6); border-radius: var(--r-md); font-weight: 600; font-size: var(--fs-base);
  display: inline-flex; align-items: center; justify-content: center; gap: var(--sp-2);
  transition: all var(--dur-fast) var(--ease-out);
  border: 1px solid transparent;
}
.btn svg { width: 16px; height: 16px; }
.btn-primary { background: var(--brand-grad); color: white; border: none; 
  box-shadow: 0 2px 12px var(--brand-glow); }
.btn-primary:hover { filter: brightness(1.08); }
.btn-primary:active { transform: scale(.98); }
.btn-secondary { background: var(--surface); color: var(--fg); border-color: var(--border); }
.btn-secondary:hover { background: var(--surface-hover); border-color: var(--border-strong); }
.btn-danger { background: var(--danger-bg); color: var(--danger); border-color: rgba(244,63,94,.25); }
.btn-sm { padding: var(--sp-2) var(--sp-3); font-size: var(--fs-sm); }
.btn:disabled { opacity: .35; cursor: not-allowed; }

/* =============================
   MODAL — Glass bottom sheet
   ============================= */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.50); z-index: 200;
  display: none; align-items: flex-end; justify-content: center;
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
}
@media (min-width: 768px) { .modal-overlay { align-items: center; } }
.modal-overlay.active { display: flex; }
.modal {
  background: var(--bg-elev); border-radius: var(--r-xl) var(--r-xl) 0 0;
  width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  animation: slideUp var(--dur-base) var(--ease-spring);
  border: 1px solid var(--glass-border); border-bottom: none;
}
@media (min-width: 768px) { .modal { border-radius: var(--r-xl); border: 1px solid var(--glass-border); } }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-header { padding: var(--sp-4); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg-elev); z-index: 1; }
.modal-title { font-size: var(--fs-lg); font-weight: 700; letter-spacing: -.01em; }
.modal-body { padding: var(--sp-4); }
.modal-footer { padding: var(--sp-4); display: flex; gap: var(--sp-3); border-top: 1px solid var(--border); position: sticky; bottom: 0; background: var(--bg-elev); }

/* =============================
   BOTTOM NAV
   ============================= */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 90;
  background: var(--glass-bg); backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
  border-top: 1px solid var(--glass-border);
  display: none; justify-content: space-around;
  padding: var(--sp-2) 0 calc(var(--sp-2) + env(safe-area-inset-bottom));
}
.bottom-nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: var(--sp-1) var(--sp-2); font-size: var(--fs-xs); color: var(--muted); font-weight: 600;
  border-radius: var(--r-sm); transition: color var(--dur-fast); min-width: 60px;
}
.bottom-nav-item.active { color: var(--emerald-bright); }
.bottom-nav-item svg { width: 20px; height: 20px; }
@media (min-width: 768px) { .bottom-nav { display: none; } }
@media (max-width: 767px) { .main { padding-bottom: 80px; } }

/* =============================
   CHART
   ============================= */
.chart-canvas-wrap { padding: var(--sp-2) var(--sp-2) var(--sp-4); position: relative; }
.chart-canvas { width: 100%; height: 200px; }
@media (min-width: 768px) { .chart-canvas { height: 280px; } }

/* =============================
   TRANSACTION LIST
   ============================= */
.txn-list { display: flex; flex-direction: column; gap: var(--sp-2); }
.txn-item {
  display: flex; align-items: center; gap: var(--sp-3); padding: var(--sp-3);
  border-radius: var(--r-md); background: var(--surface); border: 1px solid var(--border);
  transition: background var(--dur-fast), border-color var(--dur-fast);
  cursor: pointer;
}
.txn-item:hover { background: var(--surface-hover); border-color: var(--border-strong); }
.txn-item-icon {
  width: 40px; height: 40px; border-radius: var(--r-md);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  background: var(--surface-hover);
}
.txn-item-icon svg { width: 20px; height: 20px; }
.txn-item-body { flex: 1; min-width: 0; }
.txn-item-name { font-size: var(--fs-base); font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.txn-item-meta { font-size: var(--fs-xs); color: var(--muted); display: flex; gap: var(--sp-2); flex-wrap: wrap; align-items: center; }
.txn-item-meta svg { width: 11px; height: 11px; }
.txn-item-amount { font-size: var(--fs-base); font-weight: 700; flex-shrink: 0; font-variant-numeric: tabular-nums; }
.txn-item-amount.expense { color: var(--danger); }
.txn-item-amount.income { color: var(--success); }

/* =============================
   SAVINGS GOAL
   ============================= */
.savings-item { padding: var(--sp-3) var(--sp-4); border-radius: var(--r-md); background: var(--surface); border: 1px solid var(--border); margin-bottom: var(--sp-3); }
.savings-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--sp-2); }
.savings-name { font-size: var(--fs-base); font-weight: 600; display: flex; align-items: center; gap: var(--sp-2); }
.savings-name svg { width: 16px; height: 16px; }
.savings-pct { font-size: var(--fs-sm); font-weight: 700; color: var(--emerald-bright); font-variant-numeric: tabular-nums; }
.savings-input-row { display: flex; gap: var(--sp-2); margin-top: var(--sp-3); }
.savings-input-row input { flex: 1; }

/* =============================
   EMPTY STATE
   ============================= */
.empty-state { text-align: center; padding: var(--sp-8) var(--sp-4); color: var(--muted); }
.empty-state svg { width: 48px; height: 48px; margin: 0 auto var(--sp-3); opacity: .5; }
.empty-state-text { font-size: var(--fs-base); }

/* =============================
   FAB
   ============================= */
.fab {
  position: fixed; bottom: 70px; right: var(--sp-4); width: 54px; height: 54px;
  border-radius: var(--r-full); background: var(--brand-grad); color: white;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 24px var(--brand-glow); z-index: 80;
  transition: transform var(--dur-fast); border: 1px solid rgba(255,255,255,.15);
}
@media (min-width: 768px) { .fab { bottom: var(--sp-6); right: var(--sp-6); } }
.fab:active { transform: scale(.92); }
.fab svg { width: 24px; height: 24px; }
.fab-scan {
  position: fixed; bottom: 70px; right: calc(var(--sp-4) + 62px); width: 54px; height: 54px;
  border-radius: var(--r-full); background: var(--surface-solid); color: var(--emerald-bright);
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-lg); z-index: 80;
  transition: transform var(--dur-fast); border: 1px solid var(--border);
}
@media (min-width: 768px) { .fab-scan { bottom: var(--sp-6); right: calc(var(--sp-6) + 62px); } }
.fab-scan:active { transform: scale(.92); }
.fab-scan svg { width: 22px; height: 22px; }

/* =============================
   UTILITY
   ============================= */
.hidden { display: none !important; }
.text-success { color: var(--success); }
.text-danger { color: var(--danger); }
.text-muted { color: var(--muted); }
.text-primary { color: var(--emerald-bright); }
.text-center { text-align: center; }
.text-right { text-align: right; }
.fw-bold { font-weight: 700; }
.gap-2 { gap: var(--sp-2); } .gap-3 { gap: var(--sp-3); }
.flex { display: flex; } .flex-col { flex-direction: column; }
.items-center { align-items: center; } .justify-between { justify-content: space-between; }
.flex-wrap { flex-wrap: wrap; }
.mt-2 { margin-top: var(--sp-2); } .mt-4 { margin-top: var(--sp-4); }
.mb-4 { margin-bottom: var(--sp-4); }
.category-badge { display: inline-block; padding: 2px 10px; border-radius: var(--r-full); font-size: var(--fs-xs); font-weight: 600; background: var(--surface-hover); color: var(--fg-secondary); border: 1px solid var(--border); }
.section-title { font-size: var(--fs-base); font-weight: 700; margin: var(--sp-6) 0 var(--sp-3); padding-bottom: var(--sp-2); border-bottom: 1px solid var(--border); }

/* =============================
   SCAN UI
   ============================= */
.scan-preview { width: 100%; border-radius: var(--r-md); border: 2px dashed var(--border-strong); padding: var(--sp-8); text-align: center; color: var(--muted); cursor: pointer; transition: border-color var(--dur-fast); }
.scan-preview:hover { border-color: var(--emerald); }
.scan-preview.has-image { padding: 0; border-style: solid; }
.scan-preview img { width: 100%; border-radius: var(--r-md); display: block; }
.scan-preview svg { width: 40px; height: 40px; margin: 0 auto var(--sp-3); opacity: .5; }
.scan-status { display: flex; align-items: center; gap: var(--sp-3); padding: var(--sp-3) var(--sp-4); border-radius: var(--r-md); background: var(--success-bg); margin: var(--sp-3) 0; }
.scan-status .spinner { width: 20px; height: 20px; border: 3px solid var(--surface-hover); border-top-color: var(--emerald-bright); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.scan-result { padding: var(--sp-4); border-radius: var(--r-md); background: var(--surface); border: 1px solid var(--border); margin: var(--sp-3) 0; }
.scan-result-row { display: flex; justify-content: space-between; padding: var(--sp-2) 0; border-bottom: 1px solid var(--border); font-size: var(--fs-sm); }
.scan-result-row:last-child { border-bottom: none; font-weight: 700; }
.guess-pills { display: flex; flex-wrap: wrap; gap: var(--sp-2); margin-top: var(--sp-3); }
.guess-pill { padding: var(--sp-2) var(--sp-3); border-radius: var(--r-full); font-size: var(--fs-sm); font-weight: 600; background: var(--surface); border: 2px solid var(--border); cursor: pointer; transition: all var(--dur-fast); display: flex; align-items: center; gap: var(--sp-2); color: var(--fg-secondary); }
.guess-pill:hover { border-color: var(--emerald); color: var(--fg); }
.guess-pill.selected { background: var(--brand-grad); color: white; border-color: transparent; }
.guess-pill svg { width: 14px; height: 14px; }

.vt-toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(12px);background:var(--surface-solid);color:var(--fg);padding:var(--sp-3) var(--sp-4);border-radius:var(--r-md);box-shadow:var(--shadow-lg);border:1px solid var(--border);font-size:var(--fs-sm);max-width:90%;text-align:center;opacity:0;pointer-events:none;transition:opacity var(--dur-base) var(--ease-out),transform var(--dur-base) var(--ease-out);z-index:1000}
.vt-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.vt-toast.error{border-color:var(--danger);color:var(--danger)}

/* Reduce motion */
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; } }

/* ====== INDEXEDDB ====== */
function openDB() { return new Promise((resolve, reject) => { const req = indexedDB.open('VaultinDB', 2); req.onupgradeneeded = (e) => { const d = e.target.result; if (!d.objectStoreNames.contains('transactions')) { const s = d.createObjectStore('transactions', { keyPath: 'id', autoIncrement: true }); s.createIndex('byMonth', 'monthKey', { unique: false }); s.createIndex('byCategory', 'category', { unique: false }); s.createIndex('byType', 'type', { unique: false }); } if (!d.objectStoreNames.contains('budgets')) { d.createObjectStore('budgets', { keyPath: 'monthKey' }); } if (!d.objectStoreNames.contains('savingsGoals')) { d.createObjectStore('savingsGoals', { keyPath: 'id', autoIncrement: true }); } if (!d.objectStoreNames.contains('settings')) { d.createObjectStore('settings', { keyPath: 'key' }); } if (!d.objectStoreNames.contains('assets')) { d.createObjectStore('assets', { keyPath: 'id', autoIncrement: true }); } }; req.onsuccess = (e) => { db = e.target.result; resolve(db); }; req.onerror = (e) => reject(e.target.error); }); }
function dbGet(store, key) { return new Promise((resolve, reject) => { const tx = db.transaction(store, 'readonly'); const req = tx.objectStore(store).get(key); req.onsuccess = () => resolve(req.result); req.onerror = () => reject(req.error); }); }
function dbGetAll(store) { return new Promise((resolve, reject) => { const tx = db.transaction(store, 'readonly'); const req = tx.objectStore(store).getAll(); req.onsuccess = () => resolve(req.result); req.onerror = () => reject(req.error); }); }
function dbPut(store, val) { return new Promise((resolve, reject) => { const tx = db.transaction(store, 'readwrite'); tx.objectStore(store).put(val); tx.oncomplete = () => resolve(); tx.onerror = () => reject(tx.error); }); }
function dbAdd(store, val) { return new Promise((resolve, reject) => { const tx = db.transaction(store, 'readwrite'); const req = tx.objectStore(store).add(val); req.onsuccess = () => resolve(req.result); tx.onerror = () => reject(tx.error); }); }
function dbDelete(store, key) { return new Promise((resolve, reject) => { const tx = db.transaction(store, 'readwrite'); tx.objectStore(store).delete(key); tx.oncomplete = () => resolve(); tx.onerror = () => reject(tx.error); }); }
function dbGetByIndex(store, indexName, value) { return new Promise((resolve, reject) => { const tx = db.transaction(store, 'readonly'); const idx = tx.objectStore(store).index(indexName); const req = idx.getAll(value); req.onsuccess = () => resolve(req.result); req.onerror = () => reject(req.error); }); }

/* ====== UTILS ====== */
function monthKey(y, m) { return y + '-' + String(m + 1).padStart(2, '0'); }
function currentMonthKey() { return monthKey(currentYear, currentMonth); }
function formatRupiah(n) { if (n === null || n === undefined || isNaN(n)) n = 0; return 'Rp ' + Math.round(n).toLocaleString('id-ID'); }
function formatRupiahShort(n) { if (n >= 1e9) return 'Rp ' + (n/1e9).toFixed(1) + 'M'; if (n >= 1e6) return 'Rp ' + (n/1e6).toFixed(1) + 'jt'; if (n >= 1e3) return 'Rp ' + (n/1e3).toFixed(0) + 'rb'; return formatRupiah(n); }
function parseNumber(val) { let n = parseFloat(val); return isNaN(n) ? 0 : n; }
function escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
function colorForIndex(i) { return CAT_COLORS[i % CAT_COLORS.length]; }
function saveSetting(key, value) { dbPut('settings', { key, value }).catch(()=>{}); }
async function getSetting(key) { try { const r = await dbGet('settings', key); return r ? r.value : null; } catch { return null; } }
function typeLabel(type) { return { income:'Income', expense:'Expense', bill:'Bill', debt:'Debt', savings:'Savings' }[type] || type; }

/* ====== DATA FUNCTIONS ====== */
async function getTransactions(monthK) { return dbGetByIndex('transactions', 'byMonth', monthK); }
async function getBudget(monthK) { try { return await dbGet('budgets', monthK) || { monthKey: monthK }; } catch { return { monthKey: monthK }; } }
async function saveBudget(budget) { await dbPut('budgets', budget); budgetCache = budget; }
async function getSavingsGoals() { return dbGetAll('savingsGoals'); }
function sumByCategory(transactions, type) { const map = {}; transactions.filter(t => t.type === type).forEach(t => { map[t.category] = (map[t.category] || 0) + parseNumber(t.amount); }); return map; }
function sumByType(transactions, type) { return transactions.filter(t => t.type === type).reduce((s, t) => s + parseNumber(t.amount), 0); }
async function getRollover(monthK) { const [y, m] = monthK.split('-').map(Number); let pm = m - 2, py = y; if (pm < 0) { pm += 12; py -= 1; } const prevKey = monthKey(py, pm); const prevTxns = await getTransactions(prevKey); const prevBudget = await getBudget(prevKey); const prevIncome = sumByType(prevTxns, 'income') + (prevBudget.incomeRollover || 0); const prevExpense = sumByType(prevTxns, 'expense'); const prevBills = sumByType(prevTxns, 'bill'); const prevDebt = sumByType(prevTxns, 'debt'); const prevSavings = sumByType(prevTxns, 'savings'); return Math.max(0, prevIncome - prevExpense - prevBills - prevDebt - prevSavings); }

async function switchTab(tab) { currentTab = tab; document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden')); document.getElementById('tab-' + tab).classList.remove('hidden'); document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.dataset.tab === tab)); document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.tab === tab)); document.querySelectorAll('.bottom-nav-item').forEach(el => el.classList.toggle('active', el.dataset.tab === tab)); closeSidebar(); await renderTab(tab); }
async function renderTab(tab) { switch(tab) { case 'dashboard': await renderDashboard(); break; case 'income': await renderCategoryTab('income', 'Income', INCOME_CATS); break; case 'expense': await renderCategoryTab('expense', 'Expense', EXPENSE_CATS); break; case 'bills': await renderCategoryTab('bill', 'Bills', BILL_CATS); break; case 'debt': await renderCategoryTab('debt', 'Debt', DEBT_CATS); break; case 'savings': await renderSavings(); break; case 'ytd': await renderYTD(); break; case 'asset': await renderAssets(); break; case 'tax': await renderTax(); break; case 'zakat': await renderZakat(); break; } }

async function renderDashboard() {
  const monthK = currentMonthKey(); const txns = await getTransactions(monthK); const budget = await getBudget(monthK); const rollover = await getRollover(monthK);
  const totalIncome = sumByType(txns, 'income') + rollover;
  const totalExpense = sumByType(txns, 'expense'); const totalBills = sumByType(txns, 'bill'); const totalDebt = sumByType(txns, 'debt'); const totalSavings = sumByType(txns, 'savings');
  const leftover = totalIncome - totalExpense - totalBills - totalDebt - totalSavings;
  const onTrack = leftover >= 0;
  const el = document.getElementById('tab-dashboard');
  el.innerHTML = `<div class="hero-card"><div class="hero-label">Sisa Uang Bulan Ini</div><div class="hero-value">${formatRupiah(leftover)}</div><div class="hero-sub"><div class="hero-sub-item"><div class="hero-sub-label">Income</div><div class="hero-sub-value">${formatRupiah(totalIncome)}</div></div><div class="hero-sub-item"><div class="hero-sub-label">Expense</div><div class="hero-sub-value">${formatRupiah(totalExpense + totalBills)}</div></div><div class="hero-sub-item"><div class="hero-sub-label">Savings</div><div class="hero-sub-value">${formatRupiah(totalSavings)}</div></div></div></div><div class="card mt-4"><div class="card-header"><div class="card-title">Cash Flow Detail</div></div><div class="card-body"><div class="cashflow-grid"><div class="cashflow-row plus"><div class="cashflow-left"><span class="cashflow-sign" style="color:var(--success)">+</span><span class="cashflow-label">Total Income</span></div><div class="cashflow-right positive">${formatRupiah(totalIncome)}</div></div><div class="cashflow-row minus"><div class="cashflow-left"><span class="cashflow-sign" style="color:var(--danger)">−</span><span class="cashflow-label">Expenses</span></div><div class="cashflow-right">${formatRupiah(totalExpense)}</div></div><div class="cashflow-row minus"><div class="cashflow-left"><span class="cashflow-sign" style="color:var(--danger)">−</span><span class="cashflow-label">Bills</span></div><div class="cashflow-right">${formatRupiah(totalBills)}</div></div><div class="cashflow-row minus"><div class="cashflow-left"><span class="cashflow-sign" style="color:var(--danger)">−</span><span class="cashflow-label">Debt</span></div><div class="cashflow-right">${formatRupiah(totalDebt)}</div></div><div class="cashflow-row minus"><div class="cashflow-left"><span class="cashflow-sign" style="color:var(--danger)">−</span><span class="cashflow-label">Savings</span></div><div class="cashflow-right">${formatRupiah(totalSavings)}</div></div></div></div></div><div class="card mt-4"><div class="card-header"><div class="card-title">Status</div><span class="on-track-badge ${onTrack ? 'on' : 'over'}">${onTrack ? 'ON TRACK' : 'OVERBUDGET'}</span></div><div class="card-body"><div class="text-muted" style="font-size:var(--fs-sm)">Rollover bulan lalu: ${formatRupiah(rollover)}</div></div></div><div class="card mt-4"><div class="card-header"><div class="card-title">Distribusi Pengeluaran</div></div><div class="chart-canvas-wrap"><canvas class="chart-canvas" id="dashChart"></canvas></div></div><div class="card mt-4"><div class="card-header"><div class="card-title">Transaksi Terbaru</div><button class="btn btn-sm btn-secondary" onclick="openTxnModal()">+ Tambah</button></div><div class="card-body" id="recentTxns"></div></div>`;
  const recent = txns.sort((a, b) => new Date(b.date) - new Date(a.date) || (b.id - a.id)).slice(0, 5);
  const recentEl = document.getElementById('recentTxns');
  if (recent.length === 0) { recentEl.innerHTML = '<div class="empty-state">' + catIcon('Food') + '<div class="empty-state-text">Belum ada transaksi bulan ini</div></div>'; }
  else { recentEl.innerHTML = recent.map(t => txnItemHTML(t)).join('') + (txns.length > 5 ? '<div class="text-center text-muted" style="font-size:var(--fs-xs);padding:var(--sp-3)">+' + (txns.length - 5) + ' transaksi lainnya</div>' : ''); }
  drawPieChart('dashChart', txns.filter(t => t.type === 'expense'));
  await renderDashboardNetWorth();
}

async function renderDashboardNetWorth() {
  const assets = await getAssets(); if (assets.length === 0) return;
  const el = document.getElementById('tab-dashboard'); if (!el) return; const hero = el.querySelector('.hero-card'); if (!hero) return;
  const totalValue = assets.reduce((s, a) => s + assetValue(a), 0); const totalCost = assets.reduce((s, a) => s + assetCost(a), 0);
  const gain = totalValue - totalCost; const gp = totalCost > 0 ? (gain / totalCost) * 100 : 0; const gc = gain >= 0 ? 'var(--success)' : 'var(--danger)';
  const html = '<div class="card mt-4" onclick="switchTab(\'asset\')" style="cursor:pointer"><div class="card-header"><div class="card-title">Kekayaan Aset (Net Worth)</div><span class="category-badge">Lihat semua</span></div><div class="card-body"><div class="flex justify-between items-center"><div><div class="fw-bold" style="font-size:var(--fs-2xl)">' + formatRupiah(totalValue) + '</div><div style="font-size:var(--fs-sm);color:' + gc + '">' + formatPct(gp) + ' \u00b7 ' + formatRupiah(gain) + '</div></div><div class="text-right text-muted" style="font-size:var(--fs-xs)">' + assets.length + ' aset</div></div></div></div>';
  hero.insertAdjacentHTML('afterend', html);
}

async function renderCategoryTab(type, title, cats) {
  const monthK = currentMonthKey(); const txns = await getTransactions(monthK); const budget = await getBudget(monthK); const sums = sumByCategory(txns, type);
  const totalActual = cats.reduce((s, c) => s + (sums[c] || 0), 0); const totalExpected = cats.reduce((s, c) => s + (budget[type + '_' + c] || 0), 0);
  const pct = totalExpected > 0 ? Math.min(100, (totalActual / totalExpected) * 100) : 0;
  const el = document.getElementById('tab-' + (type === 'bill' ? 'bills' : type === 'debt' ? 'debt' : type));
  el.innerHTML = '<div class="card"><div class="card-header"><div class="card-title">Total ' + title + ' Bulan Ini</div><button class="btn btn-sm btn-secondary" onclick="openBudgetModal(\'' + type + '\')">Set Expected</button></div><div class="card-body"><div class="flex justify-between items-center mb-4"><div><div class="text-muted" style="font-size:var(--fs-xs)">Actual</div><div class="fw-bold" style="font-size:var(--fs-2xl)">' + formatRupiah(totalActual) + '</div></div><div class="text-right"><div class="text-muted" style="font-size:var(--fs-xs)">Expected</div><div class="fw-bold text-muted" style="font-size:var(--fs-xl)">' + formatRupiah(totalExpected) + '</div></div></div><div class="progress-track"><div class="progress-fill" style="width:' + pct + '%;background:' + (pct > 100 ? 'var(--c-danger)' : 'var(--brand-grad)') + '"></div></div><div class="progress-label-row"><span>' + pct.toFixed(0) + '% terpakai</span><span>Sisa: ' + formatRupiah(Math.max(0, totalExpected - totalActual)) + '</span></div></div></div><div class="card mt-4"><div class="card-header"><div class="card-title">Per Kategori</div></div><div class="card-body" id="catList"></div></div><div class="card mt-4"><div class="card-header"><div class="card-title">Transaksi ' + title + ' Bulan Ini</div><button class="btn btn-sm btn-secondary" onclick="openTxnModal(\'' + type + '\')">+ Tambah</button></div><div class="card-body" id="txnList"></div></div>';
  const catListEl = document.getElementById('catList');
  catListEl.innerHTML = cats.map((c, i) => {
    const act = sums[c] || 0; const exp = budget[type + '_' + c] || 0; const p = exp > 0 ? Math.min(100, (act / exp) * 100) : 0;
    const color = p > 100 ? 'var(--danger)' : colorForIndex(i);
    return '<div class="savings-item" style="margin-bottom:var(--sp-3)"><div class="savings-header"><div class="savings-name" style="color:var(--fg)">' + catIcon(c) + ' ' + c + '</div><div class="savings-pct" style="color:' + (p > 100 ? 'var(--danger)' : 'var(--emerald-bright)') + '">' + p.toFixed(0) + '%</div></div><div class="progress-track"><div class="progress-fill" style="width:' + p + '%;background:' + color + '"></div></div><div class="progress-label-row"><span>' + formatRupiah(act) + '</span><span class="text-muted">Expected: ' + formatRupiah(exp) + '</span></div></div>';
  }).join('');
  const filtered = txns.filter(t => t.type === type).sort((a, b) => new Date(b.date) - new Date(a.date) || (b.id - a.id));
  const txnListEl = document.getElementById('txnList');
  if (filtered.length === 0) { txnListEl.innerHTML = '<div class="empty-state">' + catIcon(cats[0]) + '<div class="empty-state-text">Belum ada transaksi ' + title.toLowerCase() + ' bulan ini</div></div>'; }
  else { txnListEl.innerHTML = filtered.map(t => txnItemHTML(t)).join(''); }
}

function drawPieChart(canvasId, expenseTxns) {
  const canvas = document.getElementById(canvasId); if (!canvas) return; const ctx = canvas.getContext('2d'); const dpr = window.devicePixelRatio || 1; const rect = canvas.getBoundingClientRect(); canvas.width = rect.width * dpr; canvas.height = rect.height * dpr; ctx.scale(dpr, dpr); ctx.clearRect(0, 0, rect.width, rect.height);
  const catSums = {}; expenseTxns.forEach(t => { catSums[t.category] = (catSums[t.category] || 0) + parseNumber(t.amount); }); const entries = Object.entries(catSums).filter(([, v]) => v > 0).sort((a, b) => b[1] - a[1]);
  if (entries.length === 0) { ctx.fillStyle = getCSSVar('--muted'); ctx.font = '13px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('Belum ada data pengeluaran', rect.width / 2, rect.height / 2); return; }

  entries.forEach((entry, i) => { const sliceAngle = (entry[1] / total) * Math.PI * 2; ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, radius, angle, angle + sliceAngle); ctx.closePath(); ctx.fillStyle = colorForIndex(i); ctx.fill(); angle += sliceAngle; });

}
function drawBarChart(canvasId, monthsData) {
  const canvas = document.getElementById(canvasId); if (!canvas) return; const ctx = canvas.getContext('2d'); const dpr = window.devicePixelRatio || 1; const rect = canvas.getBoundingClientRect(); canvas.width = rect.width * dpr; canvas.height = rect.height * dpr; ctx.scale(dpr, dpr); ctx.clearRect(0, 0, rect.width, rect.height);
  if (monthsData.length === 0) return; const padding = { top: 20, right: 16, bottom: 30, left: 50 }; const chartW = rect.width - padding.left - padding.right; const chartH = rect.height - padding.top - padding.bottom;
  const values = monthsData.map(d => [d.income, d.expense + d.bills, d.savings]); const maxVal = Math.max(...values.flat(), 1); const niceMax = Math.ceil(maxVal / 1000000) * 1000000 || Math.ceil(maxVal / 100000) * 100000 || maxVal;
  const barCount = monthsData.length; const barGroupW = chartW / barCount; const barW = Math.max(8, Math.min(30, barGroupW * 0.25)); const gap = 3;

async function callGeminiVision(apiKey, base64, mimeType) {

  const url = 'https://generativelanguage.googleapis.com/v1beta/models/' + GEMINI_MODEL + ':generateContent?key=' + encodeURIComponent(apiKey);

function normalizeScanResult(obj) {

async function fetchLivePrices(showToast) {
  const assets = await getAssets();

  if (liveAssets.length === 0) { if (showToast) assetToast('Belum ada aset live (crypto/emas) untuk di-update.'); return; }
  const ids = new Set(); liveAssets.forEach(a => { if (a.priceSource === 'crypto' && a.symbol) ids.add(a.symbol); if (a.priceSource === 'gold') ids.add('pax-gold'); });
  if (ids.size === 0) { if (showToast) assetToast('Tidak ada simbol valid untuk harga live.'); return; }
  const url = 'https://api.coingecko.com/api/v3/simple/price?ids=' + [...ids].join(',') + '&vs_currencies=idr';
  try {
    const res = await fetch(url); if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json(); let updated = 0;
    for (const a of liveAssets) {
      let price = null;
      if (a.priceSource === 'crypto' && data[a.symbol] && data[a.symbol].idr) price = data[a.symbol].idr;
      else if (a.priceSource === 'gold' && data['pax-gold'] && data['pax-gold'].idr) price = data['pax-gold'].idr / GRAMS_PER_OZ;
      if (price && price > 0) { a.currentPrice = price; a.lastPriceUpdate = new Date().toISOString(); await dbPut('assets', a); updated++; }
    }
    if (showToast) assetToast(updated > 0 ? ('Harga live diperbarui: ' + updated + ' aset.') : 'Tidak ada harga cocok dari sumber.');
  } catch (e) { if (showToast) assetToast('Gagal ambil harga live (offline / diblokir browser). Pakai harga tersimpan.', true); }
}

const PTKP_OPTIONS = [
  { key: 'TK/0', label: 'TK/0 · Lajang, tanpa tanggungan', amount: 54000000 },
  { key: 'TK/1', label: 'TK/1 · Lajang, 1 tanggungan', amount: 58500000 },
  { key: 'TK/2', label: 'TK/2 · Lajang, 2 tanggungan', amount: 63000000 },
  { key: 'TK/3', label: 'TK/3 · Lajang, 3 tanggungan', amount: 67500000 },

  { key: 'K/1', label: 'K/1 · Menikah, 1 tanggungan', amount: 63000000 },
  { key: 'K/2', label: 'K/2 · Menikah, 2 tanggungan', amount: 67500000 },
  { key: 'K/3', label: 'K/3 · Menikah, 3 tanggungan', amount: 72000000 },
];
const TAX_BRACKETS = [
  { upTo: 60000000, rate: 0.05 },
  { upTo: 250000000, rate: 0.15 },
  { upTo: 500000000, rate: 0.25 },
  { upTo: 5000000000, rate: 0.30 },
  { upTo: Infinity, rate: 0.35 },
];
const INCOME_TYPE_OPTIONS = [
  { key: 'employee', label: 'Karyawan / Pegawai (dapat biaya jabatan)' },
  { key: 'freelance', label: 'Freelancer / Pekerja bebas' },
  { key: 'business', label: 'Usaha / Bisnis' },
];
async function getTaxProfile() {
  const p = await getSetting('taxProfile');
  return Object.assign({ ptkpStatus: 'TK/0', hasNPWP: true, incomeType: 'employee', useAutoIncome: true, manualAnnualIncome: 0, ppnRate: 11, ppnBase: 0 }, p || {});
}
async function saveTaxProfile(p) { await saveSetting('taxProfile', p); }
function ptkpAmount(key) { const o = PTKP_OPTIONS.find(x => x.key === key); return o ? o.amount : 54000000; }
function calcPph21(grossAnnual, ptkpStatus, incomeType, hasNPWP) {
  grossAnnual = Math.max(0, grossAnnual || 0);
  let biayaJabatan = 0;
  if (incomeType === 'employee') biayaJabatan = Math.min(grossAnnual * 0.05, 6000000);
  const netAnnual = Math.max(0, grossAnnual - biayaJabatan);
  const ptkp = ptkpAmount(ptkpStatus);
  let pkp = Math.max(0, netAnnual - ptkp);
  pkp = Math.floor(pkp / 1000) * 1000;
  const breakdown = []; let remaining = pkp; let prev = 0; let baseTax = 0;
  for (const b of TAX_BRACKETS) {
    if (remaining <= 0) break;
    const span = b.upTo - prev;
    const taxable = Math.min(remaining, span);
    if (taxable > 0) { const t = taxable * b.rate; breakdown.push({ from: prev, to: prev + taxable, rate: b.rate, taxable, tax: t }); baseTax += t; }
    remaining -= taxable; prev = b.upTo;
  }
  const surcharge = hasNPWP ? 0 : baseTax * 0.20;
  const totalTax = baseTax + surcharge;
  return { grossAnnual, biayaJabatan, netAnnual, ptkp, pkp, breakdown, baseTax, surcharge, totalTax, monthlyTax: totalTax / 12, effectiveRate: grossAnnual > 0 ? (totalTax / grossAnnual) * 100 : 0, takeHome: grossAnnual - totalTax };
}
async function getAnnualIncomeEstimate() {
  const year = currentYear; let total = 0; const months = currentMonth + 1;
  for (let m = 0; m <= currentMonth; m++) { const txns = await getTransactions(monthKey(year, m)); total += sumByType(txns, 'income'); }
  const avg = months > 0 ? total / months : 0;
  return { ytdIncome: total, monthsElapsed: months, avgMonthly: avg, annualized: avg * 12 };
}

    html += r.breakdown.map(b => '<tr><td>' + formatRupiahShort(b.from) + ' – ' + formatRupiahShort(b.to) + '</td><td class="text-right">' + Math.round(b.rate * 100) + '%</td><td class="text-right">' + formatRupiahShort(b.taxable) + '</td><td class="text-right fw-bold">' + formatRupiahShort(b.tax) + '</td></tr>').join('');

/* ====== ZAKAT — Fase 3: Konsultan Zakat ====== */
const NISAB_GOLD_GRAM = 85;
const ZAKAT_RATE = 0.025;
async function getZakatProfile() {
  const p = await getSetting('zakatProfile');
  return Object.assign({ goldPricePerGram: 1350000, useAutoIncome: true, manualMonthlyIncome: 0, haulMet: true, extraCash: 0 }, p || {});
}
async function saveZakatProfile(p) { await saveSetting('zakatProfile', p); }
async function getZakatAssets() {
  const assets = await getAssets();
  let gold = 0, cash = 0, invest = 0, piutang = 0;
  assets.forEach(a => { const v = assetValue(a); if (a.type === 'gold') gold += v; else if (a.type === 'deposito') cash += v; else if (a.type === 'stock' || a.type === 'crypto' || a.type === 'reksadana') invest += v; else if (a.type === 'piutang') piutang += v; });
  return { gold, cash, invest, piutang };
}
async function detectGoldPrice() {
  const assets = await getAssets();
  const golds = assets.filter(a => a.type === 'gold' && assetUnitPrice(a) > 0);
  return golds.length ? assetUnitPrice(golds[0]) : 0;
}
async function renderZakat() {
  const el = document.getElementById('tab-zakat');
  const profile = await getZakatProfile();
  const za = await getZakatAssets();
  const detected = await detectGoldPrice();
  const goldPrice = parseNumber(profile.goldPricePerGram) > 0 ? parseNumber(profile.goldPricePerGram) : (detected > 0 ? detected : 1350000);
  const nisab = NISAB_GOLD_GRAM * goldPrice;
  const extraCash = parseNumber(profile.extraCash);
  const totalCash = za.cash + extraCash;
  const totalHarta = za.gold + totalCash + za.invest + za.piutang;
  const reachNisab = totalHarta >= nisab;
  const zakatMal = (reachNisab && profile.haulMet) ? totalHarta * ZAKAT_RATE : 0;
  const est = await getAnnualIncomeEstimate();
  const annualIncome = profile.useAutoIncome ? est.annualized : parseNumber(profile.manualMonthlyIncome) * 12;
  const incomeReachNisab = annualIncome >= nisab;
  const zakatIncomeYear = incomeReachNisab ? annualIncome * ZAKAT_RATE : 0;
  const zakatIncomeMonth = zakatIncomeYear / 12;
  const totalZakatYear = zakatMal + zakatIncomeYear;
  let html = '';
  html += '<div class="hero-card" style="background:linear-gradient(135deg,#059669 0%,#0d9488 100%)"><div class="hero-label">Estimasi Zakat Wajib Setahun</div><div class="hero-value">' + formatRupiah(totalZakatYear) + '</div><div class="hero-sub"><div class="hero-sub-item"><div class="hero-sub-label">Zakat Mal</div><div class="hero-sub-value">' + formatRupiahShort(zakatMal) + '</div></div><div class="hero-sub-item"><div class="hero-sub-label">Zakat Penghasilan</div><div class="hero-sub-value">' + formatRupiahShort(zakatIncomeYear) + '</div></div><div class="hero-sub-item"><div class="hero-sub-label">Per Bulan</div><div class="hero-sub-value">' + formatRupiahShort(totalZakatYear / 12) + '</div></div></div></div>';
  html += '<div class="card mt-4" style="border-color:var(--border-strong)"><div class="card-body" style="display:flex;gap:var(--sp-3);align-items:flex-start"><span style="font-size:18px">ℹ️</span><div class="text-muted" style="font-size:var(--fs-xs);line-height:1.5">Mengikuti pedoman <strong>BAZNAS</strong>: nisab 85 gram emas, kadar 2,5%, dengan syarat <strong>haul</strong> (kepemilikan 1 tahun) untuk zakat mal. Estimasi ini edukatif — untuk penyaluran resmi gunakan BAZNAS/LAZ terpercaya.</div></div></div>';
  html += '<div class="card mt-4"><div class="card-header"><div class="card-title">Nisab & Pengaturan</div></div><div class="card-body">';
  html += '<div class="form-group"><label class="form-label">Harga Emas / gram (Rp)</label><input type="number" class="form-input" id="zakatGoldPrice" value="' + (parseNumber(profile.goldPricePerGram) || Math.round(goldPrice)) + '" min="0" step="10000" onchange="onZakatChange()"></div>';
  if (detected > 0) html += '<div class="text-muted" style="font-size:var(--fs-xs)">Terdeteksi dari aset emasmu: ' + formatRupiah(detected) + '/gram. Sesuaikan bila perlu.</div>';
  html += '<div class="cashflow-grid" style="margin-top:var(--sp-3)">' + taxRow('Nisab (85 gram emas)', formatRupiah(nisab), 'total') + '</div>';
  html += '<div class="form-row" style="margin-top:var(--sp-3)"><div class="form-group"><label class="form-label">Sudah haul (≥ 1 tahun)?</label><select class="form-select" id="zakatHaul" onchange="onZakatChange()"><option value="yes"' + (profile.haulMet ? ' selected' : '') + '>Ya</option><option value="no"' + (!profile.haulMet ? ' selected' : '') + '>Belum</option></select></div><div class="form-group"><label class="form-label">Tabungan tunai lain (Rp)</label><input type="number" class="form-input" id="zakatExtraCash" value="' + (profile.extraCash || '') + '" placeholder="0" min="0" step="100000" onchange="onZakatChange()"></div></div>';
  html += '</div></div>';
  html += '<div class="card mt-4"><div class="card-header"><div class="card-title">Zakat Mal</div>' + (reachNisab ? '<span class="on-track-badge on">Mencapai nisab</span>' : '<span class="on-track-badge over">Belum nisab</span>') + '</div><div class="card-body"><div class="cashflow-grid">';
  html += taxRow('Emas & Logam Mulia', formatRupiah(za.gold), 'plus');
  html += taxRow('Tabungan & Deposito', formatRupiah(totalCash), 'plus');
  html += taxRow('Investasi (Saham, Crypto, Reksadana)', formatRupiah(za.invest), 'plus');
  html += taxRow('Piutang', formatRupiah(za.piutang), 'plus');
  html += taxRow('Total Harta Wajib Zakat', formatRupiah(totalHarta), 'total');
  html += '</div>';
  if (!reachNisab) { html += '<div class="empty-state" style="padding:var(--sp-4)"><div class="empty-state-text">Total hartamu belum mencapai nisab (' + formatRupiahShort(nisab) + '). Kurang ' + formatRupiahShort(nisab - totalHarta) + ' lagi untuk wajib zakat mal.</div></div>'; }
  else if (!profile.haulMet) { html += '<div class="empty-state" style="padding:var(--sp-4)"><div class="empty-state-text">Harta sudah mencapai nisab. Bila genap haul (1 tahun), zakat yang dikeluarkan: <strong>' + formatRupiah(totalHarta * ZAKAT_RATE) + '</strong> (2,5%).</div></div>'; }
  else { html += '<div class="cashflow-grid" style="margin-top:var(--sp-3)">' + taxRow('Zakat Mal (2,5%)', formatRupiah(zakatMal), 'total') + '</div>'; }
  html += '</div></div>';
  html += '<div class="card mt-4"><div class="card-header"><div class="card-title">Zakat Penghasilan</div></div><div class="card-body">';
  html += '<div class="form-group"><label class="form-label">Sumber Penghasilan</label><select class="form-select" id="zakatIncomeMode" onchange="onZakatChange()"><option value="auto"' + (profile.useAutoIncome ? ' selected' : '') + '>Otomatis (dari transaksi)</option><option value="manual"' + (!profile.useAutoIncome ? ' selected' : '') + '>Input manual</option></select></div>';
  if (profile.useAutoIncome) html += '<div class="text-muted" style="font-size:var(--fs-xs)">Disetahunkan dari rata-rata income ' + est.monthsElapsed + ' bulan (' + formatRupiahShort(est.avgMonthly) + '/bln × 12).</div>';
  else html += '<div class="form-group"><label class="form-label">Penghasilan per Bulan (Rp)</label><input type="number" class="form-input" id="zakatManualIncome" value="' + (profile.manualMonthlyIncome || '') + '" placeholder="0" min="0" step="500000" onchange="onZakatChange()"></div>';
  html += '<div class="cashflow-grid" style="margin-top:var(--sp-3)">' + taxRow('Penghasilan Setahun', formatRupiah(annualIncome), 'plus') + taxRow('Nisab Penghasilan (85 gr emas)', formatRupiah(nisab), 'minus') + '</div>';
  if (incomeReachNisab) { html += '<div class="cashflow-grid" style="margin-top:var(--sp-3)">' + taxRow('Zakat / Bulan (2,5%)', formatRupiah(zakatIncomeMonth), 'minus') + taxRow('Zakat Penghasilan / Tahun', formatRupiah(zakatIncomeYear), 'total') + '</div>'; }
  else { html += '<div class="empty-state" style="padding:var(--sp-4)"><div class="empty-state-text">Penghasilan setahun belum mencapai nisab, jadi belum wajib zakat penghasilan. Tetap dianjurkan bersedekah. 🤲</div></div>'; }
  html += '</div></div>';
  el.innerHTML = html;
}
async function onZakatChange() {
  const profile = await getZakatProfile();
  const gp = document.getElementById('zakatGoldPrice'); if (gp) profile.goldPricePerGram = parseNumber(gp.value);
  const haul = document.getElementById('zakatHaul'); if (haul) profile.haulMet = haul.value === 'yes';
  const ec = document.getElementById('zakatExtraCash'); if (ec) profile.extraCash = parseNumber(ec.value);
  const mode = document.getElementById('zakatIncomeMode'); if (mode) profile.useAutoIncome = mode.value === 'auto';
  const mi = document.getElementById('zakatManualIncome'); if (mi) profile.manualMonthlyIncome = parseNumber(mi.value);
  await saveZakatProfile(profile);
  await renderZakat();
}

  const seeded = await getSetting('seeded'); if (seeded) return;
  const mk = currentMonthKey(); const today = new Date().toISOString().split('T')[0]; const dayAgo = new Date(Date.now() - 86400000).toISOString().split('T')[0]; const twoDaysAgo = new Date(Date.now() - 2*86400000).toISOString().split('T')[0];
  const seeds = [
    { type: 'income', category: 'Paycheck', amount: 12000000, date: today, description: 'Gaji bulanan', monthKey: mk, createdAt: new Date().toISOString() },
    { type: 'expense', category: 'Food', amount: 75000, date: today, description: 'Makan siang', monthKey: mk, createdAt: new Date().toISOString() },
    { type: 'expense', category: 'Transportation', amount: 50000, date: today, description: 'Ojek online', monthKey: mk, createdAt: new Date().toISOString() },
    { type: 'expense', category: 'Food', amount: 45000, date: dayAgo, description: 'Groceries', monthKey: mk, createdAt: new Date().toISOString() },
    { type: 'bill', category: 'Netflix', amount: 53000, date: dayAgo, description: 'Netflix monthly', monthKey: mk, createdAt: new Date().toISOString() },
    { type: 'savings', category: 'Travel Fund', amount: 500000, date: twoDaysAgo, description: 'Tabungan awal', monthKey: mk, createdAt: new Date().toISOString() },
    { type: 'debt', category: 'BCA', amount: 800000, date: twoDaysAgo, description: 'Cicilan kartu kredit', monthKey: mk, createdAt: new Date().toISOString() }
  ];
  for (const s of seeds) { await dbAdd('transactions', s); }
  const budget = { monthKey: mk }; budget['income_Paycheck'] = 12000000; budget['expense_Food'] = 1200000; budget['expense_Transportation'] = 70000; budget['expense_Household'] = 100000; budget['expense_Beauty'] = 50000; budget['bill_Netflix'] = 37000; budget['bill_House Rent'] = 700000; budget['debt_BCA'] = 800000;
  await saveBudget(budget);
  await dbAdd('savingsGoals', { name: 'Travel Fund', target: 5000000, totalSaved: 500000 });
  await dbAdd('savingsGoals', { name: 'Wedding Fund', target: 10000000, totalSaved: 0 });
  const nowISO = new Date().toISOString();
  await dbAdd('assets', { type: 'gold', name: 'Emas Antam', symbol: 'pax-gold', priceSource: 'gold', quantity: 10, unit: 'gram', buyPrice: 1050000, currentPrice: 1180000, buyDate: today, liveEnabled: true, notes: 'Logam mulia batangan', createdAt: nowISO, updatedAt: nowISO, lastPriceUpdate: null });
  await dbAdd('assets', { type: 'crypto', name: 'Bitcoin', symbol: 'bitcoin', priceSource: 'crypto', quantity: 0.05, unit: 'koin', buyPrice: 900000000, currentPrice: 1050000000, buyDate: today, liveEnabled: true, notes: '', createdAt: nowISO, updatedAt: nowISO, lastPriceUpdate: null });
  await dbAdd('assets', { type: 'property', name: 'Rumah Bekasi', symbol: '', priceSource: 'manual', quantity: 1, unit: 'unit', buyPrice: 450000000, currentPrice: 620000000, buyDate: today, liveEnabled: false, notes: 'SHM', createdAt: nowISO, updatedAt: nowISO, lastPriceUpdate: null });
  await saveSetting('seeded', true);
}

/* ====== THEME ====== */
async function toggleTheme() { const c = document.documentElement.dataset.theme || 'dark'; const n = c === 'dark' ? 'light' : 'dark'; document.documentElement.dataset.theme = n; await saveSetting('theme', n); if (currentTab) renderTab(currentTab); }
async function loadTheme() { const theme = await getSetting('theme') || 'dark'; document.documentElement.dataset.theme = theme; }
async function renderMonthLabel() { document.getElementById('monthLabel').textContent = MONTH_NAMES[currentMonth] + ' ' + currentYear; }
function prevMonth() { currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; } renderMonthLabel(); switchTab(currentTab); }
function nextMonth() { currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; } renderMonthLabel(); switchTab(currentTab); }

/* ====== SERVICE WORKER ====== */
if ('serviceWorker' in navigator) {
  const swCode = 'const C="vaultin-v2";self.addEventListener("install",e=>self.skipWaiting());self.addEventListener("activate",e=>e.waitUntil(self.clients.claim()));self.addEventListener("fetch",e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(res&&res.status===200&&e.request.method==="GET"){const c=res.clone();caches.open(C).then(ca=>ca.put(e.request,c))}return res}).catch(()=>caches.match(e.request))))});';
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

/* ====== EVENT LISTENERS ====== */
function openSidebar() { const s = document.getElementById('sidebar'); const o = document.getElementById('sidebarOverlay'); if (s) s.classList.add('open'); if (o) o.classList.add('open'); }
function closeSidebar() { const s = document.getElementById('sidebar'); const o = document.getElementById('sidebarOverlay'); if (s) s.classList.remove('open'); if (o) o.classList.remove('open'); }
function initEvents() {
  document.querySelectorAll('.tab').forEach(el => el.addEventListener('click', () => switchTab(el.dataset.tab)));
  document.querySelectorAll('.nav-item').forEach(el => el.addEventListener('click', () => switchTab(el.dataset.tab)));
  document.querySelectorAll('.nav-group-header').forEach(h => h.addEventListener('click', () => h.parentElement.classList.toggle('collapsed')));
  { const mb = document.getElementById('menuBtn'); if (mb) mb.addEventListener('click', openSidebar); const sc = document.getElementById('sidebarClose'); if (sc) sc.addEventListener('click', closeSidebar); const ov = document.getElementById('sidebarOverlay'); if (ov) ov.addEventListener('click', closeSidebar); }
  document.querySelectorAll('.bottom-nav-item').forEach(el => el.addEventListener('click', () => switchTab(el.dataset.tab)));
  document.getElementById('prevMonth').addEventListener('click', prevMonth);
  document.getElementById('nextMonth').addEventListener('click', nextMonth);
  document.getElementById('themeToggle').addEventListener('click', toggleTheme);
  document.getElementById('exportBtn').addEventListener('click', exportData);
  document.getElementById('importFile').addEventListener('change', e => { if (e.target.files[0]) importData(e.target.files[0]); e.target.value = ''; });
  document.getElementById('fabAdd').addEventListener('click', () => { if (currentTab === 'asset') openAssetModal(); else openTxnModal(); });
  document.getElementById('fabScan').addEventListener('click', openScanModal);
  document.getElementById('closeTxnModal').addEventListener('click', closeTxnModal);
  document.getElementById('cancelTxnBtn').addEventListener('click', closeTxnModal);
  document.getElementById('saveTxnBtn').addEventListener('click', saveTxn);
  document.getElementById('deleteTxnBtn').addEventListener('click', deleteTxn);
  document.getElementById('txnModal').addEventListener('click', e => { if (e.target.id === 'txnModal') closeTxnModal(); });
  ['Expense','Income','Bill','Debt','Savings'].forEach(t => { document.getElementById('type' + t).addEventListener('click', () => { selectedTxnType = t.toLowerCase(); updateTxnTypeButtons(); populateCategoryDropdown(); }); });
  document.getElementById('closeBudgetModal').addEventListener('click', closeBudgetModal);
  document.getElementById('cancelBudgetBtn').addEventListener('click', closeBudgetModal);
  document.getElementById('saveBudgetBtn').addEventListener('click', saveBudgetData);
  document.getElementById('budgetModal').addEventListener('click', e => { if (e.target.id === 'budgetModal') closeBudgetModal(); });
  document.getElementById('closeScanModal').addEventListener('click', closeScanModal);
  document.getElementById('cancelScanBtn').addEventListener('click', closeScanModal);
  document.getElementById('saveScanBtn').addEventListener('click', saveScanTxn);
  document.getElementById('scanModal').addEventListener('click', e => { if (e.target.id === 'scanModal') closeScanModal(); });
  document.getElementById('scanPreview').addEventListener('click', () => { const inp = document.getElementById('scanFileInput'); if (inp) inp.click(); });
  document.getElementById('scanFileInput').addEventListener('change', handleScanFile);
  document.getElementById('scanCategoryManual').addEventListener('change', e => { if (e.target.value) { const parts = e.target.value.split('|'); scanSelectedCategory = parts[0]; scanSelectedType = parts[1]; } });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeTxnModal(); closeBudgetModal(); closeScanModal(); closeAssetModal(); } });
  let resizeTimer; window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(() => { if (!document.getElementById('tab-' + currentTab).classList.contains('hidden')) renderTab(currentTab); }, 200); });
}

/* ====== INIT ====== */
async function init() { await openDB(); await loadTheme(); await seedData(); initEvents(); await renderMonthLabel(); await switchTab('dashboard'); }
init();
</script>
